<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Anytime Fitness Class Schedule</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #17151f;
      --muted: #686273;
      --line: #dfd9e8;
      --panel: #ffffff;
      --wash: #f7f2fb;
      --brand: #6c2bd9;
      --brand-dark: #3b156f;
      --teal: #00a6a6;
      --gold: #e8b74c;
      --danger: #b72650;
      --shadow: 0 18px 45px rgba(45, 21, 77, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        linear-gradient(135deg, rgba(108, 43, 217, 0.14), transparent 34%),
        linear-gradient(315deg, rgba(0, 166, 166, 0.12), transparent 36%),
        var(--wash);
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
    }

    .shell {
      width: min(1440px, calc(100% - 32px));
      margin: 0 auto;
      padding: 28px 0 44px;
    }

    header {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 18px;
      align-items: end;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0;
      font-size: clamp(28px, 4vw, 54px);
      line-height: 0.96;
      letter-spacing: 0;
      color: var(--brand-dark);
    }

    .meta {
      margin-top: 10px;
      color: var(--muted);
      font-size: 15px;
    }

    .statbar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: flex-end;
    }

    .stat {
      min-width: 108px;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.74);
      box-shadow: 0 8px 24px rgba(45, 21, 77, 0.08);
    }

    .stat strong {
      display: block;
      font-size: 23px;
      color: var(--brand);
    }

    .stat span {
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
    }

    .filters {
      position: sticky;
      top: 0;
      z-index: 10;
      display: grid;
      grid-template-columns: 1.25fr 1fr 1fr 1fr auto;
      gap: 10px;
      align-items: end;
      padding: 12px;
      border: 1px solid rgba(108, 43, 217, 0.18);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.92);
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }

    label {
      display: grid;
      gap: 6px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
    }

    select,
    input,
    button {
      min-height: 42px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      font: inherit;
      letter-spacing: 0;
    }

    select,
    input {
      width: 100%;
      padding: 0 12px;
    }

    .combo {
      position: relative;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 38px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
    }

    .combo:focus-within {
      border-color: var(--brand);
      box-shadow: 0 0 0 3px rgba(108, 43, 217, 0.15);
    }

    .combo input {
      border: 0;
      border-radius: 8px 0 0 8px;
      min-width: 0;
      padding-right: 6px;
    }

    .combo input:focus {
      outline: 0;
    }

    .combo-toggle {
      min-height: 40px;
      padding: 0;
      border: 0;
      border-radius: 0 8px 8px 0;
      background: #fff;
      color: var(--ink);
      font-size: 16px;
    }

    .combo-toggle:hover {
      background: #f5effc;
      color: var(--brand-dark);
    }

    .combo-menu {
      position: absolute;
      top: calc(100% + 6px);
      left: 0;
      right: 0;
      z-index: 30;
      display: none;
      max-height: 280px;
      overflow-y: auto;
      padding: 6px;
      border: 1px solid rgba(45, 21, 77, 0.14);
      border-radius: 8px;
      background: #fff;
      box-shadow: var(--shadow);
      text-transform: none;
    }

    .combo-menu.open {
      display: grid;
      gap: 2px;
    }

    .combo-option {
      min-height: 36px;
      display: flex;
      align-items: center;
      padding: 8px 10px;
      border-radius: 6px;
      color: var(--ink);
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      text-transform: none;
    }

    .combo-option:hover,
    .combo-option.active {
      background: #f0e8fb;
      color: var(--brand-dark);
    }

    .combo-empty {
      padding: 10px;
      color: var(--muted);
      font-size: 13px;
      text-transform: none;
    }

    button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 0 16px;
      border-color: transparent;
      background: var(--brand);
      color: #fff;
      font-weight: 800;
      cursor: pointer;
    }

    button:hover {
      background: var(--brand-dark);
    }

    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin: 18px 0 12px;
      color: var(--muted);
    }

    .quick-filters {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 16px;
      min-width: 0;
    }

    .tabs {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      padding-bottom: 2px;
    }

    .tab {
      min-height: 36px;
      padding: 0 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
      white-space: nowrap;
      cursor: pointer;
    }

    .tab.active {
      border-color: transparent;
      background: var(--teal);
      color: #fff;
    }

    .count {
      font-weight: 800;
      color: var(--brand-dark);
      white-space: nowrap;
    }

    .schedule {
      display: grid;
      grid-template-columns: repeat(7, minmax(170px, 1fr));
      gap: 12px;
      align-items: start;
    }

    .schedule-images {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .schedule-images img {
      display: block;
      width: 100%;
      height: auto;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      box-shadow: var(--shadow);
    }

    .image-drawer {
      margin-top: 18px;
    }

    .image-drawer summary {
      display: inline-flex;
      min-height: 42px;
      align-items: center;
      padding: 0 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--brand-dark);
      font-weight: 900;
      cursor: pointer;
      box-shadow: 0 8px 24px rgba(45, 21, 77, 0.08);
    }

    .image-drawer[open] summary {
      margin-bottom: 12px;
    }

    .day {
      min-height: 360px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.78);
      overflow: hidden;
    }

    .day h2 {
      margin: 0;
      padding: 12px;
      background: var(--brand-dark);
      color: #fff;
      font-size: 16px;
      letter-spacing: 0;
    }

    .class-list {
      display: grid;
      gap: 8px;
      padding: 10px;
    }

    .class-card {
      display: grid;
      gap: 8px;
      min-height: 116px;
      padding: 11px;
      border: 1px solid rgba(108, 43, 217, 0.16);
      border-left: 4px solid var(--brand);
      border-radius: 8px;
      background: #fff;
      box-shadow: 0 10px 24px rgba(45, 21, 77, 0.08);
    }

    .class-card:nth-child(3n + 2) {
      border-left-color: var(--teal);
    }

    .class-card:nth-child(3n) {
      border-left-color: var(--gold);
    }

    .class-time {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: max-content;
      min-height: 28px;
      max-width: 100%;
      padding: 5px 9px;
      border-radius: 8px;
      background: #f0e8fb;
      color: var(--brand-dark);
      font-size: 12px;
      font-weight: 900;
      line-height: 1.15;
      overflow-wrap: anywhere;
    }

    .class-name {
      margin: 0;
      font-size: 18px;
      line-height: 1.18;
      color: var(--ink);
      overflow-wrap: anywhere;
    }

    .outlet {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.3;
    }

    .chip-row {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      align-items: center;
      margin-top: 2px;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      max-width: 100%;
      padding: 5px 9px;
      border-radius: 8px;
      background: #f0e8fb;
      color: var(--brand-dark);
      font-size: 12px;
      font-weight: 900;
      line-height: 1.15;
      overflow-wrap: anywhere;
    }

    .chip.instructor {
      background: #edf8f8;
      color: #006d6d;
    }

    .empty {
      padding: 16px 12px;
      color: var(--muted);
      font-size: 13px;
    }

    @media (max-width: 1120px) {
      header {
        grid-template-columns: 1fr;
      }

      .statbar {
        justify-content: flex-start;
      }

      .filters {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .filters button {
        grid-column: span 2;
      }

      .schedule {
        grid-template-columns: repeat(3, minmax(190px, 1fr));
      }

      .schedule-images {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 720px) {
      .shell {
        width: min(100% - 20px, 720px);
        padding: 14px 0 32px;
      }

      header {
        gap: 12px;
        margin-bottom: 12px;
      }

      h1 {
        font-size: 30px;
        line-height: 1.02;
      }

      .meta {
        margin-top: 6px;
        font-size: 13px;
      }

      .statbar {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 6px;
      }

      .stat {
        min-width: 0;
        padding: 8px;
      }

      .stat strong {
        font-size: 19px;
      }

      .stat span {
        font-size: 10px;
      }

      .filters {
        position: static;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
        padding: 10px;
        box-shadow: 0 10px 28px rgba(45, 21, 77, 0.1);
      }

      label {
        gap: 5px;
        font-size: 11px;
      }

      input,
      button {
        min-height: 38px;
      }

      .combo {
        grid-template-columns: minmax(0, 1fr) 34px;
      }

      .combo-toggle {
        min-height: 36px;
      }

      .filters button {
        grid-column: span 2;
      }

      .toolbar {
        position: sticky;
        top: 0;
        z-index: 8;
        align-items: flex-start;
        flex-direction: column;
        gap: 8px;
        margin: 12px -10px 10px;
        padding: 10px;
        border: 1px solid rgba(108, 43, 217, 0.14);
        background: rgba(247, 242, 251, 0.94);
        backdrop-filter: blur(12px);
      }

      .quick-filters {
        display: grid;
        width: 100%;
        gap: 8px;
      }

      .tabs {
        width: 100%;
        padding-bottom: 4px;
        scroll-snap-type: x proximity;
      }

      .tab {
        min-height: 34px;
        padding: 0 11px;
        font-size: 12px;
        scroll-snap-align: start;
      }

      .count {
        font-size: 13px;
      }

      .schedule {
        grid-template-columns: 1fr;
        gap: 10px;
      }

      .day {
        min-height: 0;
      }

      .day h2 {
        padding: 10px;
        font-size: 15px;
      }

      .class-list {
        gap: 7px;
        padding: 8px;
      }

      .class-card {
        grid-template-columns: 74px minmax(0, 1fr);
        grid-template-areas:
          "time name"
          "time outlet"
          "time instructor";
        gap: 3px 10px;
        min-height: 0;
        padding: 10px;
        border-left-width: 3px;
      }

      .class-time {
        grid-area: time;
        align-self: center;
        width: 100%;
        min-height: 42px;
        padding: 5px 6px;
        text-align: center;
      }

      .class-name {
        grid-area: name;
        font-size: 15px;
        line-height: 1.2;
      }

      .outlet {
        grid-area: outlet;
        font-size: 12px;
      }

      .chip-row {
        display: contents;
      }

      .chip.instructor {
        grid-area: instructor;
        width: max-content;
        max-width: 100%;
      }

      .chip {
        margin-top: 0;
        min-height: 24px;
        padding: 4px 8px;
        font-size: 11px;
      }

      .image-drawer {
        margin-top: 14px;
      }

      .image-drawer summary {
        width: 100%;
        justify-content: center;
      }
    }

    @media (max-width: 420px) {
      .class-card {
        grid-template-columns: 68px minmax(0, 1fr);
      }

      .class-time {
        font-size: 11px;
      }
    }

    @media (max-width: 340px) {
      .filters {
        grid-template-columns: 1fr;
      }

      .filters button {
        grid-column: auto;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <header>
      <div>
        <h1>Anytime Fitness Class Schedule</h1>
        <div class="meta">Four outlets, one searchable weekly view.</div>
      </div>
      <div class="statbar" aria-live="polite">
        <div class="stat"><strong id="totalClasses">0</strong><span>Classes</span></div>
        <div class="stat"><strong id="totalOutlets">0</strong><span>Outlets</span></div>
        <div class="stat"><strong id="totalInstructors">0</strong><span>Instructors</span></div>
      </div>
    </header>

    <section class="filters" aria-label="Filters">
      <label>
        Outlet
        <div class="combo">
          <input id="outletFilter" type="search" value="All" autocomplete="off" aria-haspopup="listbox" aria-expanded="false">
          <button class="combo-toggle" type="button" aria-label="Show outlet options">▾</button>
          <div class="combo-menu" id="outletOptions" role="listbox"></div>
        </div>
      </label>
      <label>
        Class
        <div class="combo">
          <input id="classFilter" type="search" value="All" autocomplete="off" aria-haspopup="listbox" aria-expanded="false">
          <button class="combo-toggle" type="button" aria-label="Show class options">▾</button>
          <div class="combo-menu" id="classOptions" role="listbox"></div>
        </div>
      </label>
      <label>
        Timing
        <div class="combo">
          <input id="timingFilter" type="search" value="All" autocomplete="off" aria-haspopup="listbox" aria-expanded="false">
          <button class="combo-toggle" type="button" aria-label="Show timing options">▾</button>
          <div class="combo-menu" id="timingOptions" role="listbox"></div>
        </div>
      </label>
      <label>
        Instructor
        <div class="combo">
          <input id="instructorFilter" type="search" value="All" autocomplete="off" aria-haspopup="listbox" aria-expanded="false">
          <button class="combo-toggle" type="button" aria-label="Show instructor options">▾</button>
          <div class="combo-menu" id="instructorOptions" role="listbox"></div>
        </div>
      </label>
      <button id="resetButton" type="button">Reset</button>
    </section>

    <section class="toolbar" aria-label="Schedule controls">
      <div class="quick-filters">
        <div class="tabs" id="dayTabs" aria-label="Day filters"></div>
        <div class="tabs" id="classTypeTabs" aria-label="Class type filters"></div>
      </div>
      <div class="count" id="resultCount">0 classes</div>
    </section>

    <section class="schedule" id="schedule" aria-label="Class cards"></section>

    <details class="image-drawer" open>
      <summary>Original schedule images</summary>
      <section class="schedule-images" aria-label="Original schedule images">
        <img src="./WhatsApp Image 2026-06-30 at 18.20.45.jpeg" alt="Original Anytime Fitness class schedule image 1" loading="lazy">
        <img src="./WhatsApp Image 2026-06-30 at 18.20.45 (1).jpeg" alt="Original Anytime Fitness class schedule image 2" loading="lazy">
        <img src="./WhatsApp Image 2026-06-30 at 18.21.10.jpeg" alt="Original Anytime Fitness class schedule image 3" loading="lazy">
        <img src="./WhatsApp Image 2026-06-30 at 18.22.19.jpeg" alt="Original Anytime Fitness class schedule image 4" loading="lazy">
      </section>
    </details>
  </main>

  <script src="classes.js"></script>
  <script>
    const classes = window.CLASSES || [];
    const days = ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday", "Sunday"];
    const state = {
      outlet: "All",
      className: "All",
      timing: "All",
      instructor: "All",
      day: "All",
      classType: "All"
    };

    const outletFilter = document.querySelector("#outletFilter");
    const classFilter = document.querySelector("#classFilter");
    const timingFilter = document.querySelector("#timingFilter");
    const instructorFilter = document.querySelector("#instructorFilter");
    const outletOptions = document.querySelector("#outletOptions");
    const classOptions = document.querySelector("#classOptions");
    const timingOptions = document.querySelector("#timingOptions");
    const instructorOptions = document.querySelector("#instructorOptions");
    const dayTabs = document.querySelector("#dayTabs");
    const classTypeTabs = document.querySelector("#classTypeTabs");
    const schedule = document.querySelector("#schedule");
    const resultCount = document.querySelector("#resultCount");
    const imageDrawer = document.querySelector(".image-drawer");
    const classTypes = ["Yoga", "Hyrox / HIIT / Circuit Style"];

    function uniqueValues(key) {
      return [...new Set(classes.map((item) => item[key]).filter(Boolean))]
        .sort((a, b) => a.localeCompare(b));
    }

    function outletName(outlet) {
      return outlet
        .replace(/^Anytime Fitness\s+/i, "");
    }

    function uniqueOutletNames() {
      return [...new Set(classes.map((item) => outletName(item.outlet)))]
        .sort((a, b) => a.localeCompare(b));
    }

    function filterQuery(value) {
      const query = (value || "").trim().toLowerCase();
      return !query || query === "all" ? "" : query;
    }

    function textMatches(value, candidate) {
      const query = filterQuery(value);
      return !query || String(candidate || "TBD").toLowerCase().includes(query);
    }

    function timeValue(time) {
      const match = time.match(/^(\d{1,2}):(\d{2})\s*(AM|PM)$/i);
      if (!match) return 0;
      let hours = Number(match[1]) % 12;
      if (match[3].toUpperCase() === "PM") hours += 12;
      return hours * 60 + Number(match[2]);
    }

    function timeOfDay(item) {
      const minutes = timeValue(item.time);
      return minutes < 720 ? "morning" : minutes < 1020 ? "afternoon" : "evening";
    }

    function timingChoices() {
      const values = ["Morning", "Afternoon", "Evening"];
      const seen = new Set();
      sortedItems(classes).forEach((item) => {
        if (seen.has(item.time)) return;
        seen.add(item.time);
        values.push(item.time);
      });
      return values;
    }

    function matchesTiming(item) {
      const query = filterQuery(state.timing);
      if (!query) return true;
      if (["morning", "afternoon", "evening"].includes(query)) return timeOfDay(item) === query;
      const shorthand = query.match(/^(\d{1,2})\s*(am|pm)$/);
      if (shorthand) {
        return item.time.toLowerCase().startsWith(`${Number(shorthand[1])}:`)
          && item.time.toLowerCase().endsWith(shorthand[2]);
      }
      return item.time.toLowerCase().includes(query);
    }

    function sortedItems(items) {
      return [...items].sort((a, b) => {
        const dayDiff = days.indexOf(a.day) - days.indexOf(b.day);
        if (dayDiff) return dayDiff;
        const timeDiff = timeValue(a.time) - timeValue(b.time);
        if (timeDiff) return timeDiff;
        return a.outlet.localeCompare(b.outlet) || a.className.localeCompare(b.className);
      });
    }

    function filteredItems() {
      return sortedItems(classes).filter((item) => {
        return textMatches(state.outlet, outletName(item.outlet))
          && textMatches(state.className, item.className)
          && textMatches(state.instructor, item.instructor || "TBD")
          && (state.day === "All" || item.day === state.day)
          && (state.classType === "All" || item.classType === state.classType)
          && matchesTiming(item);
      });
    }

    function renderStats() {
      document.querySelector("#totalClasses").textContent = classes.length;
      document.querySelector("#totalOutlets").textContent = uniqueValues("outlet").length;
      document.querySelector("#totalInstructors").textContent = new Set(classes.map((item) => item.instructor || "TBD")).size;
    }

    function renderTabs() {
      const tabs = ["All", ...days].map((day) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = `tab${state.day === day ? " active" : ""}`;
        button.textContent = day;
        button.addEventListener("click", () => {
          state.day = day;
          render();
        });
        return button;
      });
      dayTabs.replaceChildren(...tabs);
    }

    function renderClassTypeTabs() {
      const tabs = ["All", ...classTypes].map((classType) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = `tab${state.classType === classType ? " active" : ""}`;
        button.textContent = classType;
        button.addEventListener("click", () => {
          state.classType = classType;
          render();
        });
        return button;
      });
      classTypeTabs.replaceChildren(...tabs);
    }

    function renderSchedule(items) {
      const visibleDays = state.day === "All" ? days : [state.day];
      const columns = visibleDays.map((day) => {
        const section = document.createElement("article");
        section.className = "day";
        section.innerHTML = `<h2>${day}</h2>`;
        const list = document.createElement("div");
        list.className = "class-list";
        const dayItems = items.filter((item) => item.day === day);

        if (!dayItems.length) {
          const empty = document.createElement("div");
          empty.className = "empty";
          empty.textContent = "No classes match.";
          list.append(empty);
        } else {
          dayItems.forEach((item) => {
            const card = document.createElement("article");
            card.className = "class-card";
            card.innerHTML = `
              <h3 class="class-name">${item.className}</h3>
              <div class="outlet">${outletName(item.outlet)}</div>
              <div class="chip-row">
                <span class="chip class-time">${item.time}</span>
                <span class="chip instructor">${item.instructor || "TBD"}</span>
              </div>
            `;
            list.append(card);
          });
        }

        section.append(list);
        return section;
      });
      schedule.replaceChildren(...columns);
    }

    function render() {
      renderTabs();
      renderClassTypeTabs();
      const items = filteredItems();
      resultCount.textContent = `${items.length} ${items.length === 1 ? "class" : "classes"}`;
      renderSchedule(items);
    }

    function closeComboMenus(exceptMenu = null) {
      document.querySelectorAll(".combo-menu.open").forEach((menu) => {
        if (menu === exceptMenu) return;
        menu.classList.remove("open");
        menu.closest(".combo")?.querySelector("input")?.setAttribute("aria-expanded", "false");
      });
    }

    function setupSearchableCombo(input, menu, choices, stateKey) {
      const options = ["All", ...choices];

      function matchingOptions() {
        const query = filterQuery(input.value);
        return options.filter((value) => {
          return value === "All" || !query || value.toLowerCase().includes(query);
        });
      }

      function choose(value) {
        input.value = value;
        state[stateKey] = value;
        closeComboMenus();
        render();
      }

      function renderMenu() {
        const values = matchingOptions();
        if (!values.length) {
          const empty = document.createElement("div");
          empty.className = "combo-empty";
          empty.textContent = "No matches";
          menu.replaceChildren(empty);
          return;
        }

        const items = values.map((value) => {
          const item = document.createElement("div");
          item.className = `combo-option${value === input.value || (value === "All" && !filterQuery(input.value)) ? " active" : ""}`;
          item.role = "option";
          item.textContent = value;
          item.addEventListener("mousedown", (event) => {
            event.preventDefault();
            choose(value);
          });
          return item;
        });
        menu.replaceChildren(...items);
      }

      function openMenu() {
        closeComboMenus(menu);
        renderMenu();
        menu.classList.add("open");
        input.setAttribute("aria-expanded", "true");
      }

      input.addEventListener("focus", openMenu);
      input.addEventListener("input", (event) => {
        state[stateKey] = event.target.value;
        openMenu();
        render();
      });
      input.addEventListener("keydown", (event) => {
        if (event.key === "Escape") closeComboMenus();
        if (event.key === "ArrowDown") {
          event.preventDefault();
          openMenu();
        }
        if (event.key === "Enter" && menu.classList.contains("open")) {
          const active = menu.querySelector(".combo-option.active") || menu.querySelector(".combo-option");
          if (active) {
            event.preventDefault();
            choose(active.textContent);
          }
        }
      });

      input.closest(".combo").querySelector(".combo-toggle").addEventListener("mousedown", (event) => {
        event.preventDefault();
        if (menu.classList.contains("open")) {
          closeComboMenus();
          return;
        }
        input.focus();
        openMenu();
      });
    }

    function bindFilters() {
      setupSearchableCombo(outletFilter, outletOptions, uniqueOutletNames(), "outlet");
      setupSearchableCombo(classFilter, classOptions, uniqueValues("className"), "className");
      setupSearchableCombo(timingFilter, timingOptions, timingChoices(), "timing");
      setupSearchableCombo(instructorFilter, instructorOptions, [...new Set(classes.map((item) => item.instructor || "TBD"))].sort((a, b) => a.localeCompare(b)), "instructor");

      document.addEventListener("mousedown", (event) => {
        if (!event.target.closest(".combo")) closeComboMenus();
      });
      document.querySelector("#resetButton").addEventListener("click", () => {
        state.outlet = "All";
        state.className = "All";
        state.timing = "All";
        state.instructor = "All";
        state.day = "All";
        state.classType = "All";
        outletFilter.value = "All";
        classFilter.value = "All";
        timingFilter.value = "All";
        instructorFilter.value = "All";
        render();
      });
    }

    const mobileView = window.matchMedia("(max-width: 720px)");

    function setResponsiveDefaults() {
      if (!imageDrawer) return;
      imageDrawer.open = !mobileView.matches;
    }

    mobileView.addEventListener("change", setResponsiveDefaults);

    bindFilters();
    setResponsiveDefaults();
    renderStats();
    render();
  </script>
</body>
</html>
